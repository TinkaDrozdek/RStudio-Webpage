    {q:"Kaj pomeni -?",a:"Negativno",o:["Negativno","Pozitivno","Ni"]},
    {q:"Korelacija je med?",a:"2 spremenljivkama",o:["2 spremenljivkama","1","3"]}

  ]

/* ================= ENGINE ================= */

let selectedTopics = [];
let questions = [];
let current = 0;
let score = 0;

function startExam() {

  selectedTopics = Array.from(document.querySelectorAll("input:checked"))
    .map(x => x.value);

  if (selectedTopics.length === 0) {
    alert("Izberi temo!");
    return;
  }

  document.getElementById("menu").style.display = "none";
  document.getElementById("quiz").style.display = "block";

  questions = buildExam(12);
  current = 0;
  score = 0;

  showQuestion();
}

/* ✅ build exam without repeats */

function buildExam(n) {

  let pool = [];

  selectedTopics.forEach(t => {
    pool = pool.concat(questionBank[t]);
  });

  shuffle(pool);

  return pool.slice(0, n);
}

function showQuestion() {

  let q = questions[current];

  document.getElementById("question").innerText =
    (current+1) + ". " + q.q;

  let div = document.getElementById("options");
  div.innerHTML = "";

  shuffle(q.o).forEach(opt => {
    let btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, opt);
    div.appendChild(btn);
  });
}

function checkAnswer(btn, selected) {

  if (selected === questions[current].a) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
  }

  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {

  current++;

  if (current >= questions.length) {
    finish();
    return;
  }

  document.getElementById("nextBtn").style.display = "none";
  showQuestion();
}

function finish() {

  document.getElementById("quiz").style.display = "none";

  let res = document.getElementById("result");

  res.style.display = "block";

  res.innerHTML = `
    ✅ Rezultat: ${score}/${questions.length}
    <br><br>
    <button onclick="location.reload()">Ponovi</button>
  `;
}

/* ================= HELPERS ================= */

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

</script>

</html>
