{q:"Katera struktura ima iste tipe?",o:["Vektor","Seznam","Tabela","Graf"],a:"Vektor"},
{q:"Kaj naredi length()?",o:["Šteje elemente","Riše","Shrani","Izbriše"],a:"Šteje elemente"},
{q:"Kaj naredi plot()?",o:["Riše graf","Briše","Shrani","Sešteje"],a:"Riše graf"},
{q:"Kaj naredi hist()?",o:["Histogram","Tabela","Napaka","Sešteje"],a:"Histogram"},
{q:"Kaj naredi barplot()?",o:["Stolpčni graf","Histogram","Tabela","Napaka"],a:"Stolpčni graf"},

``

/* ✅ (we reuse pattern → these 20 repeat variations from PDF set) */

/* ================= ENGINE ================= */

let questions = [];
let current = 0;
let score = 0;

function startExam() {

  document.getElementById("menu").style.display = "none";
  document.getElementById("quiz").style.display = "block";

  questions = buildExam(10);
  current = 0;
  score = 0;

  showQuestion();
}

/* ✅ random unique */

function buildExam(n) {
  let shuffled = shuffle([...questionBank]);
  return shuffled.slice(0, n);
}

function showQuestion() {

  let q = questions[current];

  document.getElementById("question").innerText =
    (current+1) + ". " + q.q;

  let div = document.getElementById("options");
  div.innerHTML = "";

  shuffle(q.o).forEach(opt => {
    let btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, opt);
    div.appendChild(btn);
  });
}

function checkAnswer(btn, selected) {

  if (selected === questions[current].a) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
  }

  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {

  current++;

  if (current >= questions.length) {
    finish();
    return;
  }

  document.getElementById("nextBtn").style.display = "none";
  showQuestion();
}

function finish() {

  document.getElementById("quiz").style.display = "none";

  let res = document.getElementById("result");
  res.style.display = "block";

  res.innerHTML = `
    ✅ Rezultat: ${score}/${questions.length}
    <br><br>
    <button onclick="location.reload()">Ponovi</button>
  `;
}

/* ================= HELPERS ================= */

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

</script>

</html>
